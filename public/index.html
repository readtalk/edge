<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <style type="text/css">
    * {
      box-sizing: border-box;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    #chatlog {
      position: fixed;
      top: 0;
      bottom: 32px;
      left: 0;
      right: 200px;
      overflow-y: auto;
      padding: 8px;
      overflow-wrap: break-word;
    }
    #chatlog span.username {
      font-weight: bold;
    }
    #spacer {
      height: calc(100vh - 32px - 5em);
    }

    #roster {
      font-weight: bold;
      padding: 8px;
    }

    p {
      margin-top: 0;
      margin-bottom: 8px;
    }
    p:last-of-type {
      margin: 0;
    }

    #roster {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 32px;
      width: 200px;
      border-left: none;
    }

    ::-webkit-scrollbar {
      display: none;
    }

    @media(max-width:600px) {
      #roster { display: none; }
      #chatlog { right: 0; }
    }

    #chat-input {
      position: fixed;
      width: 100%;
      height: 32px;
      bottom: 0;
      left: 0;
      border: none;
      border-top: none;
      padding-left: 32px;
      outline: none;
    }
    #chatroom::before {
      z-index: 1;
      display: block;
      content: ">";
      position: fixed;
      bottom: 0;
      left: 0;
      width: 32px;
      height: 32px;
      line-height: 32px;
      text-align: center;
      font-weight: bold;
      color: #888;
      -webkit-text-stroke-width: 2px;
    }

    #name-form {
      position: fixed;
      z-index: 3;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: white;
    }

    #name-input {
      position: fixed;
      font-size: 200%;
      top: calc(50% - 1em);
      left: calc(50% - 8em);
      width: 16em;
      height: 2em;
      margin: 0;
      text-align: center;
      border: 1px solid #bbb;
    }

    #name-form p {
      position: fixed;
      top: calc(50% + 3em);
      width: 100%;
      text-align: center;
    }

    #room-form {
      position: fixed;
      z-index: 2;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: white;
      font-size: 200%;
      margin-top: calc(50vh - 3em);
      text-align: center;
    }

    #room-name {
      font-size: inherit;
      border: 1px solid #bbb;
      height: 2em;
      width: 16em;
      padding-left: 1em;
    }

    #room-form button {
      font-size: inherit;
      border: 1px solid #bbb;
      background-color: #eee;
      height: 2em;
    }

    @media(max-width:660px) {
      #name-input, #room-form { font-size: 150%; }
      #name-form p { font-size: 75%; }
    }
    @media(max-width:500px) {
      #name-input, #room-form { font-size: 100%; }
      #name-form p { font-size: 50%; }
    }

    #go-public {
      width: 4em;
    }
    #go-private {
      width: 20em;
    }
  </style>
</head>
<body>
  <form id="name-form" action="/fake-form-action">
    <input id="name-input" placeholder="your name">
    <p>This chat runs entirely on the edge, at<br>
      <a href="https://readtalk.pages.dev/" target="_blank">READTalk Messenger</a></p>
  </form>

  <form id="room-form" action="/fake-form-action">
    <p>Public room:</p>
    <input id="room-name" placeholder="room name"><button id="go-public">Go &raquo;</button>
    <p>OR</p>
    <button id="go-private">Private Room &raquo;</button>
  </form>

  <form id="chatroom" action="/fake-form-action">
    <div id="chatlog">
      <div id="spacer"></div>
    </div>
    <div id="roster"></div>
    <input id="chat-input">
  </form>

  <script src="/script.js"></script>
</body>
</html>
