name = "edge"
compatibility_date = "2024-01-01"

main = "src/global.mjs"

[durable_objects]
bindings = [
  { name = "rooms", class_name = "ChatRoom" },
  { name = "limiters", class_name = "RateLimiter" },
]
[observability]
[observability.logs]
enabled = false
invocation_logs = true


[[rules]]
type = "Data"
globs = ["**/*.html"]
fallthrough = false


[[migrations]]
tag = "v1"                                       
new_sqlite_classes = ["ChatRoom", "RateLimiter"]
