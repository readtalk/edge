name = "edge"
compatibility_date = "2024-01-01"

main = "src/global.mjs"

[durable_objects]
bindings = [
  { name = "rooms", class_name = "ChatRoom" },
  { name = "limiters", class_name = "RateLimiter" },
]
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1


[[rules]]
type = "Data"
globs = ["**/*.html"]
fallthrough = false


[[migrations]]
tag = "v1"                                       
new_sqlite_classes = ["ChatRoom", "RateLimiter"]
